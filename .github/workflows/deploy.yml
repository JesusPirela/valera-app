name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Verify files
        run: ls app/\(admin\)/

      - name: Build web
        run: npx expo export --platform web --clear
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create .htaccess
        run: |
          cat > dist/.htaccess << 'EOF'
          ErrorDocument 404 /index.html
          Options -Indexes

          <FilesMatch "\.html$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
            Header set Pragma "no-cache"
            Header set Expires 0
          </FilesMatch>

          <FilesMatch "\.(js|css|png|jpg|ico|woff2)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
          </FilesMatch>
          EOF

      - name: Push dist/ a rama web-build (Hostinger)
        run: |
          cd dist
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "deploy: build web $(date +'%Y-%m-%d %H:%M')"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:web-build

      - name: Notificar a Hostinger para deploy automático
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: $(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo deploy)" \
            -d "{\"ref\":\"refs/heads/web-build\",\"repository\":{\"full_name\":\"${{ github.repository }}\"}}" \
            https://webhooks.hostinger.com/deploy/5f91d5e7333f0f2dc75f800fef8e3930 || true
