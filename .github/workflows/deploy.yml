name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web --clear
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # WhatsApp/Facebook no ejecutan JavaScript: al compartir /ficha/VR-265 leían
      # el HTML genérico de la SPA y la vista previa salía con el logo de la app.
      # ficha.php inyecta las etiquetas og: con la foto real de la propiedad.
      - name: Preparar vista previa de fichas (OpenGraph)
        env:
          SB_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          SB_ANON: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          cp web/ficha.php dist/ficha.php
          # Con `sed` no: los secrets traen un salto de línea al final y rompen
          # la expresión. Aquí se sustituye leyendo del entorno y limpiando.
          python3 - <<'PY'
          import os
          ruta = 'dist/ficha.php'
          with open(ruta, encoding='utf-8') as f:
              s = f.read()
          s = s.replace('__SUPABASE_URL__', os.environ['SB_URL'].strip())
          s = s.replace('__SUPABASE_ANON__', os.environ['SB_ANON'].strip())
          with open(ruta, 'w', encoding='utf-8') as f:
              f.write(s)
          PY

      - name: Create .htaccess
        run: |
          cat > dist/.htaccess << 'EOF'
          Options -Indexes -MultiViews

          RewriteEngine On

          # Forzar HTTPS
          RewriteCond %{HTTPS} !=on
          RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

          # Las fichas compartidas pasan por ficha.php, que devuelve el MISMO
          # index.html pero con las etiquetas og: de esa propiedad (foto, título
          # y precio) para que la vista previa de WhatsApp muestre la casa.
          RewriteRule ^ficha/([A-Za-z0-9._-]+)/?$ /ficha.php?codigo=$1 [L,QSA]

          # SPA: las rutas como /ficha/VR-1184 no son archivos reales; las sirve
          # index.html y el router del cliente decide qué pintar.
          # Antes esto se hacía con `ErrorDocument 404 /index.html`, que devuelve
          # el HTML correcto pero CON ESTADO 404: los navegadores dentro de apps
          # (WhatsApp en iOS) muestran su propia pantalla de error ante un 404 y
          # la ficha compartida se veía en blanco. Con RewriteRule se sirve con 200.
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ index.html [L]

          # Red de seguridad por si mod_rewrite no estuviera activo.
          ErrorDocument 404 /index.html

          # Cabeceras de seguridad
          Header always set X-Content-Type-Options "nosniff"
          Header always set X-Frame-Options "SAMEORIGIN"
          Header always set Referrer-Policy "strict-origin-when-cross-origin"
          Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
          Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

          <FilesMatch "\.html$">
            Header set Cache-Control "no-cache, no-store, must-revalidate"
            Header set Pragma "no-cache"
            Header set Expires 0
          </FilesMatch>

          <FilesMatch "\.(js|css|png|jpg|ico|woff2)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
          </FilesMatch>
          EOF

      - name: Push dist/ a rama web-build
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          cp -r dist /tmp/dist-build
          git fetch origin web-build 2>/dev/null || true
          git checkout -B web-build origin/web-build 2>/dev/null || git checkout --orphan web-build
          git rm -rf . > /dev/null 2>&1 || true
          cp -r /tmp/dist-build/. .
          git add -A
          git diff --staged --quiet || git commit -m "deploy: build web $(date +'%Y-%m-%d %H:%M')"
          git push origin web-build

      - name: Notificar a Hostinger
        run: |
          curl -s -w "\nHTTP: %{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/web-build"}' \
            https://webhooks.hostinger.com/deploy/62de3af8ceb4a3832a5b6f3f2351bdc6
