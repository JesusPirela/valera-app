name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create .htaccess for SPA routing
        run: echo 'ErrorDocument 404 /index.html' > dist/.htaccess

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -c "
            set ftp:passive-mode true;
            set ftp:ssl-allow no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://45.137.159.251;
            mirror --reverse --delete --verbose --exclude=.git --exclude=.htaccess ./dist/ /public_html/;
            put dist/.htaccess -o /public_html/.htaccess;
          "
