name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create .htaccess for SPA routing
        run: printf 'ErrorDocument 404 /index.html\n' > dist/.htaccess

      - name: Install sshpass
        run: sudo apt-get install -y sshpass rsync

      - name: Deploy via rsync over SSH
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 65002" \
            dist/ ${{ secrets.FTP_USERNAME }}@45.137.159.251:/home/${{ secrets.FTP_USERNAME }}/public_html/
